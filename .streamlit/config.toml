# .streamlit/config.toml
# Theme: UK institutional / policy-paper. Place this file at .streamlit/config.toml in the repo root.

[theme]
base = "light"
primaryColor = "#1F4E79"          # accent navy - interactive elements
backgroundColor = "#FBFAF7"       # paper - warm archival off-white
secondaryBackgroundColor = "#F3F1EB"  # sidebar / cards
textColor = "#14212B"             # ink
font = "sans serif"

[server]
maxUploadSize = 25

[browser]
gatherUsageStats = false
